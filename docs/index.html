<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Movie Explorer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>🎬 Movie Explorer</h1>

<div id="movie-form">
  <h2>Adicionar Filme</h2>
  <input id="title" placeholder="Título">
  <input id="year" type="number" placeholder="Ano">
  <input id="genre" placeholder="Gênero">
  <input id="image_url" placeholder="URL da Imagem">
  <input id="description" placeholder="Descrição">
  <button onclick="addMovie()">Adicionar Filme</button>
</div>

<h2>Filmes</h2>
<div id="movies"></div>

<h2>🎲 Recomendação Aleatória</h2>
<button onclick="getRecommendation()">Me Recomenda um Filme</button>
<div id="recommendation"></div>

<script src="script.js"></script>
</body>
</html>
